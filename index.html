<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analisador de Comando</title>

<style>
    html {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #333;
        padding-top: 130px;
    }

    .top-bar {
        position: fixed;
        left: 0;
        width: 100%;
        z-index: 999;
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
    }

    .top-bar-inner {
        width: 1200px;
        max-width: calc(100% - 32px);
        margin: auto;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 2;
    }

    .top-bar-main {
        top: 0;
        height: 45px;
        background: rgba(15, 15, 15, 0.95);
    }

    .top-bar-sub {
        top: 45px;
        height: 55px;
        background: rgba(0, 0, 0, 0.92);
        border-bottom: 1px solid #4D4D4D;
    }

    .blur-layer {
        position: absolute;
        inset: 0;
        background: rgba(15, 15, 15, 0.75);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        z-index: 1;
    }

    .logo {
        height: 20px;
        display: block;
    }

    .titulo-pequeno {
        font-size: 21px;
        font-weight: 600;
        color: #f5f5f7;
    }

    .menu-header {
        display: flex;
        gap: 24px;
    }

    .menu-item {
        font-size: 14px;
        font-weight: 500;
        color: #b5b5b8;
        cursor: pointer;
        position: relative;
        text-decoration: none;
        display: inline-block;
    }

    .menu-item.ativo {
        color: #ffffff;
    }

    .menu-item.ativo::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -16px;
        height: 2px;
        background: #ffffff;
    }

    .container {
        max-width: 1200px;
        margin: 30px auto;
        padding: 20px;
    }

    h1 {
        color: #333;
    }

    textarea {
        width: 100%;
        padding: 10px;
        font-family: Consolas, monospace;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
    }

    #comando {
        height: 250px;
    }

    #resultado {
        height: 350px;
        margin-top: 20px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background: #0078d7;
        color: white;
        border: none;
        border-radius: 5px;
    }

    button:hover {
        background: #005fa3;
    }
</style>
</head>

<body>

<div class="top-bar top-bar-main" id="topbarMain">
    <div class="blur-layer"></div>
<div class="top-bar-inner">
    arquivos/icon_gpt_branco.png" class="logo" alt="Logo">
</div>
</div>

<div class="top-bar top-bar-sub" id="topbarSub">
    <div class="top-bar-inner">
        <div class="titulo-pequeno">Homologação Técnica</div>

        <div class="menu-header">
            <a href="index.html" class="menu-item ativo">Analisador</a>
            <a href="canales.html" class="menu-item">Canales</a>
        </div>
    </div>
</div>

<div class="container">

    <h1>Analisador de String</h1>

    <textarea id="comando" placeholder="Cole a string aqui..."></textarea>

    <br>

    <button type="button" onclick="analisar()">Analisar</button>

    <textarea id="resultado" readonly placeholder="O resultado aparecerá aqui..."></textarea>

</div>

<script>
async function carregarCanais() {
    const resposta = await fetch("arquivos/CA_Services.csv");

    if (!resposta.ok) {
        throw new Error("Não foi possível carregar o arquivo CA_Services.csv");
    }

    const conteudo = await resposta.text();

    const conteudoLimpo = conteudo.replace(/^\uFEFF/, "");

    const linhas = conteudoLimpo
        .split(/\r?\n/)
        .map(function(linha) {
            return linha.trim();
        })
        .filter(function(linha) {
            return linha !== "";
        });

    const mapaServicos = {};

    for (let i = 1; i < linhas.length; i++) {
        const partes = linhas[i].split(";");

        if (partes.length < 3) {
            continue;
        }

        const canal = partes[0].trim();

        const caService = partes
            .slice(2)
            .join(";")
            .replace(/"/g, "")
            .trim();

        const servicos = caService
            .split(",")
            .map(function(servico) {
                return servico.trim();
            })
            .filter(function(servico) {
                return servico !== "";
            });

        servicos.forEach(function(servico) {
            if (!mapaServicos[servico]) {
                mapaServicos[servico] = [];
            }

            mapaServicos[servico].push(canal);
        });
    }

    return mapaServicos;
}

async function analisar() {
    const campoComando = document.getElementById("comando");
    const campoResultado = document.getElementById("resultado");

    campoResultado.value = "Analisando...";

    let texto = campoComando.value
        .replace(/\s/g, "")
        .trim()
        .toUpperCase();

    if (texto === "") {
        campoResultado.value = "Informe uma string para analisar.";
        return;
    }

    let mapaServicos = {};

    try {
        mapaServicos = await carregarCanais();
    } catch (erro) {
        campoResultado.value = "Erro ao carregar CA_Services.csv: " + erro.message;
        return;
    }

    const posAA = texto.indexOf("AA");

    if (posAA === -1) {
        campoResultado.value = "Nenhuma sequência AA foi encontrada.";
        return;
    }

    let posicao = posAA - 13;

    if (posicao < 0) {
        campoResultado.value = "Não existem 13 caracteres antes da primeira sequência AA.";
        return;
    }

    const resultados = [];

    while (posicao + 14 <= texto.length) {
        const bloco = texto.substring(posicao, posicao + 14);

        if (bloco.length !== 14) {
            break;
        }

        if (!bloco.startsWith("A")) {
            posicao = posicao + 14;
            continue;
        }

        if (!bloco.endsWith("A")) {
            break;
        }

        const hexadecimal = bloco.substring(1, 5);

        if (!/^[0-9A-F]{4}$/.test(hexadecimal)) {
            posicao = posicao + 14;
            continue;
        }

        const decimal = parseInt(hexadecimal, 16);
        const decimalTexto = String(decimal);

        let nomeCanal = "Canal não encontrado";

        if (mapaServicos[decimalTexto]) {
            nomeCanal = mapaServicos[decimalTexto].join(" / ");
        }

        resultados.push(bloco + " = " + decimal + " - " + nomeCanal);

        posicao = posicao + 14;
    }

    if (resultados.length === 0) {
        campoResultado.value = "Nenhum bloco válido foi encontrado.";
        return;
    }

    campoResultado.value = resultados.join("\n");
}
</script>

</body>
</html>
